<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          const classes = window.localStorage.getItem('lmq.stateclasses')
          if (classes) {
            document.documentElement.classList.add(...classes.split(' '))
          }
        } catch (e) {}
      })();
    </script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>HTTP API | LavinMQ</title>
    <link rel="icon" sizes="32x32" href="../favicon.ico">
    <link rel="icon" sizes="180x180" href="../img/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../img/favicon.png">
    <link rel="stylesheet" href="../main.css">
    <link rel="stylesheet" href="docs.css">
    <script type="module" src="docs.js"></script>
  </head>
  <body class="docs-body">
    <header class="docs-header">
      <div id="menu-header">
        <a class="lavinmq-logo" href="../">
          <img alt="LavinMQ logo" class="dark" src="../img/logo-lavinmq-all-white.svg" width="120" height="24">
          <img alt="LavinMQ logo" class="light" src="../img/logo-lavinmq-all-dark.svg" width="120" height="24">
        </a>
        <span class="version-tab" id="docs-spec-version">&nbsp;</span>
      </div>
      <div class="docs-header-actions">
        <a class="btn btn-outlined btn-small-outlined docs-back-link" href="../">Back to management</a>
        <div id="theme-switcher" class="docs-theme-switcher">
          <button id="theme-light" data-theme="light" title="Light theme">
            <img src="../img/mode-icons/sun-light.svg" alt="Light theme" class="theme-icon dark">
            <img src="../img/mode-icons/sun-dark.svg" alt="Light theme" class="theme-icon light">
          </button>
          <button id="theme-dark" data-theme="dark" title="Dark theme">
            <img src="../img/mode-icons/moon-light.svg" alt="Dark theme" class="theme-icon dark">
            <img src="../img/mode-icons/moon-dark.svg" alt="Dark theme" class="theme-icon light">
          </button>
          <button id="theme-system" data-theme="system" title="System theme">
            <img src="../img/mode-icons/monitor-light.svg" alt="System theme" class="theme-icon dark">
            <img src="../img/mode-icons/monitor-dark.svg" alt="System theme" class="theme-icon light">
          </button>
        </div>
      </div>
    </header>
    <main class="docs-main">
      <aside class="docs-sidebar">
        <div class="docs-sidebar-search">
          <input type="search" id="docs-search" placeholder="Filter endpoints..." autocomplete="off">
        </div>
        <nav id="docs-toc" aria-label="Endpoints"></nav>
      </aside>
      <article class="docs-content">
        <header class="docs-intro card">
          <h1 id="docs-title">LavinMQ HTTP API</h1>
          <p id="docs-description" class="card-desc"></p>
        </header>
        <section id="docs-tags"></section>
        <section id="docs-loading" class="card">Loading API reference...</section>
      </article>
    </main>
    <footer class="docs-footer">
      <p>LavinMQ is open source and developed by
        <a href="https://www.84codes.com" target="_blank" rel="noopener">
          <img alt="84codes logo" class="logo" src="../img/logo-84codes.svg" width="55" height="20">
        </a>
      </p>
    </footer>
  </body>
</html>
